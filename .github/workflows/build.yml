name: Build Container Image
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "*"
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [amd64, arm64]

    permissions:
      packages: write

    env:
      APPS_JSON_PATH: /tmp/apps.json

    steps:
      - name: Checkout Entire Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/${{ matrix.arch }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create apps.json
        run: |
          cat > "$APPS_JSON_PATH" <<'EOF'
          [
            {"url": "https://github.com/frappe/payments", "branch": "version-15"},
            {"url": "https://github.com/frappe/lms", "branch": "main"}
          ]
          EOF
          echo "FRAPPE_BRANCH=version-16" >> $GITHUB_ENV

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=stable" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          path: builds

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: builds
          file: builds/images/layered/Containerfile
          tags: >
            ghcr.io/${{ github.repository }}:${{ github.ref_name }},
            ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}
          build-args: |
            FRAPPE_BRANCH=${{ env.FRAPPE_BRANCH }}
          secrets: |
            id=apps_json,src=${{ env.APPS_JSON_PATH }}
