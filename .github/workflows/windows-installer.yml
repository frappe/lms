# .github/workflows/windows-installer.yml
# Builds Windows installer
# - Auto-builds lite on push to feature branch
# - Manual trigger for lite or full via Actions tab (once on default branch)
name: Windows Installer

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Installer variant'
        required: true
        default: 'lite'
        type: choice
        options:
          - lite
          - full
  push:
    branches:
      - breeze-windows-installer-clean
    paths:
      - 'ikuku/**'
      - '.github/workflows/windows-installer.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      VARIANT: ${{ inputs.variant || 'lite' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build ${{ env.VARIANT }} installer
        run: powershell -ExecutionPolicy Bypass -File ikuku/build-installer.ps1 -Variant ${{ env.VARIANT }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frappe-lms-${{ env.VARIANT }}
          path: ikuku/frappe-lms-${{ env.VARIANT }}.exe
