# .github/workflows/windows-installer.yml
# Builds Windows installers — run manually from Actions tab
name: Windows Installer

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Installer variant'
        required: true
        default: 'lite'
        type: choice
        options:
          - lite
          - full

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build ${{ inputs.variant }} installer
        run: powershell -ExecutionPolicy Bypass -File ikuku/build-installer.ps1 -Variant ${{ inputs.variant }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frappe-lms-${{ inputs.variant }}
          path: ikuku/frappe-lms-${{ inputs.variant }}.exe
